<ion-header [translucent]="true">
  <ion-toolbar>
    <ion-title>新增物品</ion-title>
    <ion-buttons slot="end">
      <ion-button (click)="showHelp()">
        <ion-icon slot="icon-only" name="help-circle"></ion-icon>
      </ion-button>
    </ion-buttons>
  </ion-toolbar>
</ion-header>

<ion-content [fullscreen]="true">
  <ion-list>
    <ion-item>
      <ion-label position="stacked">物品名称 *</ion-label>
      <ion-input [(ngModel)]="newItem.item_name" required></ion-input>
    </ion-item>

    <ion-item>
      <ion-label position="stacked">类别 *</ion-label>
      <ion-select [(ngModel)]="newItem.category" placeholder="选择类别">
        <ion-select-option value="Electronics">Electronics</ion-select-option>
        <ion-select-option value="Furniture">Furniture</ion-select-option>
        <ion-select-option value="Clothing">Clothing</ion-select-option>
        <ion-select-option value="Tools">Tools</ion-select-option>
        <ion-select-option value="Miscellaneous">Miscellaneous</ion-select-option>
      </ion-select>
    </ion-item>

    <ion-item>
      <ion-label position="stacked">数量 *</ion-label>
      <ion-input type="number" [(ngModel)]="newItem.quantity" required></ion-input>
    </ion-item>

    <ion-item>
      <ion-label position="stacked">价格 *</ion-label>
      <ion-input type="number" [(ngModel)]="newItem.price" required></ion-input>
    </ion-item>

    <ion-item>
      <ion-label position="stacked">供应商名称 *</ion-label>
      <ion-input [(ngModel)]="newItem.supplier_name" required></ion-input>
    </ion-item>

    <ion-item>
      <ion-label position="stacked">库存状态 *</ion-label>
      <ion-select [(ngModel)]="newItem.stock_status" placeholder="选择状态">
        <ion-select-option value="In Stock">In Stock</ion-select-option>
        <ion-select-option value="Low Stock">Low Stock</ion-select-option>
        <ion-select-option value="Out of Stock">Out of Stock</ion-select-option>
      </ion-select>
    </ion-item>

    <ion-item>
      <ion-label>设为推荐商品</ion-label>
      <ion-toggle [(ngModel)]="newItem.featured_item" [trueValue]="1" [falseValue]="0"></ion-toggle>
    </ion-item>

    <ion-item>
      <ion-label position="stacked">备注（可选）</ion-label>
      <ion-textarea [(ngModel)]="newItem.special_note"></ion-textarea>
    </ion-item>

    <ion-button expand="block" (click)="addItem()" [disabled]="!isFormValid()">
      提交新增
    </ion-button>
  </ion-list>

  <ion-divider class="ion-margin-top"></ion-divider>
  <ion-title class="ion-padding">推荐商品</ion-title>
  <ion-list>
    <ion-item *ngFor="let item of featuredItems">
      <ion-label>
        <h2>{{ item.item_name }}</h2>
        <p>价格: ${{ item.price }}</p>
      </ion-label>
    </ion-item>
  </ion-list>
</ion-content>
